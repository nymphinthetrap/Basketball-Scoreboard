<html>

        <div class="container">
                 <div class="home-team">
                    <h3>HOME</h3>
                    <h2 id="home-score" class="home-score">0</h2>
                    <div id="home-buttons">

                </div>
            </div>

            
                <div class= "guest-team">
                <h3>GUEST</h3>
                <h2 id="guest-score" class="guest-score">0</h2>
            <div id="guest-buttons">
                <button id="guest-score-btn-1" onclick="increaseGuestScoreOne()">+1</button>
                <button id="guest-score-btn-2" onclick="increaseGuestScoreTwo()">+2</button>
                <button id="guest-score-btn-3" onclick="increaseGuestScoreThree()">+3</button>
             </div>
            </div>
        </div>
        </div>
        <script type="module" src="./index.js"></script>
    </body>
